name: CI

on:
  push:
    branches: [main, dev_alm]
  pull_request:
    branches: [main, dev_alm]

jobs:
  quality:
    name: Lint, type-check, import boundaries & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Mypy (strict)
        run: mypy

      - name: Import-linter
        run: lint-imports

      - name: Pytest with coverage
        run: pytest --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
