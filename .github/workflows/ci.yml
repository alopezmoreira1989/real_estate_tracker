# Two independent jobs, run in parallel:
#   - quality: lint/type-check/architecture-boundary/test the Python package.
#   - docker:  build the image and smoke-test it via docker compose.
# Both must pass before a PR can merge (see CONTRIBUTING.md).
name: CI

on:
  push:
    branches: [main, dev_alm]
  pull_request:
    branches: [main, dev_alm]

jobs:
  quality:
    name: Lint, type-check, import boundaries & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          # No requirements*.txt exists (dependencies live in pyproject.toml, see ADR-007) —
          # without this, setup-python's default file glob finds nothing to hash and silently
          # skips caching.
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      # Each quality gate runs as its own step so a failure is immediately attributable to one
      # tool in the Actions UI, instead of buried in one combined log.
      - name: Ruff (lint + import order)
        run: ruff check .

      - name: Black (formatting)
        run: black --check .

      - name: Mypy (strict type-check)
        run: mypy

      - name: Import-linter (architecture boundary contracts)
        run: lint-imports

      - name: Pytest (unit tests + coverage)
        run: pytest --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docker:
    name: Docker build & compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t real-estate:ci .

      - name: Validate compose file
        run: docker compose config

      - name: Run app container via compose
        # `serve` (Phase 7) is a long-running scheduler daemon — it never exits on its own, so
        # unlike a one-shot command this starts it in the background, gives it a few seconds to
        # prove it doesn't crash on startup (DB connection, migrations, scheduler wiring), then
        # tears down. An early container exit fails this step.
        run: |
          docker compose up -d app
          sleep 5
          state="$(docker compose ps -q app | xargs docker inspect -f '{{.State.Running}}')"
          if [ "$state" != "true" ]; then
            echo "app container exited early"
            docker compose logs app
            exit 1
          fi
          docker compose logs app
          docker compose down
